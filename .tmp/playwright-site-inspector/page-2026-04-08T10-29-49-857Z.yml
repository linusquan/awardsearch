          - paragraph
          - paragraph [ref=e696]: "Fashion Critical is an anonymous Australian fashion commentator, digital creator and the author of Fashion Critical: Red Carpet Lewks and LOLs from an Undercover Fashion Critic (2025)."
          - paragraph [ref=e697]: Known for her razor-sharp critiques of celebrity red-carpet fashion, she has built a fiercely devoted following including designers, stylists, celebrities themselves and of course, everyday Aussies, all of whom who pour over her verdicts long after the trophies have been handed out.
          - paragraph [ref=e698]: Her signature catchphrases and sharp wit have turned her unapologetic post-event “albums” into essential scrolling after every major awards night, reaching tens of millions around the world.
