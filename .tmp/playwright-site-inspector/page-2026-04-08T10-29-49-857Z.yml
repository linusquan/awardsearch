          - heading "The most prestigious PR & communications awards" [level=2] [ref=e42]
          - generic [ref=e45]:
            - paragraph [ref=e46]: The CommsCon Awards return for 2026 to recognise excellence, innovation and impact across Australia and New Zealand’s PR and communications industry. Communications professionals now sit at the heart of business leadership, tasked with navigating complexity, building trust, and shaping the narratives that define reputation and public confidence.
            - paragraph [ref=e47]: These prestigious awards now include new categories recognising this transformation. Best Use of Strategic Communications has been launched to recognise teams driving reputation, stakeholder influence and long-term corporate trust. Non-Traditional Campaign of the Year has been redefined to highlight communications thinking applied to behaviour change, customer experience and innovation.
            - paragraph [ref=e48]:
              - text: Plus, this year
              - strong [ref=e49]: the Emerging Talent award will be free to enter
              - text: ", reflecting Mumbrella’s commitment to supporting the next generation shaping the future of the profession."
